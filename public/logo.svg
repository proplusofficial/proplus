<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Definitions for glow filters -->
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Glowing background elements (semi-transparent, wider stroke) -->
  <g stroke="#2962ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4" filter="url(#neon-glow)">
    <!-- Star -->
    <path d="M 48 24 Q 48 52 76 52 Q 48 52 48 80 Q 48 52 20 52 Q 48 52 48 24 Z" />
    <!-- Plus Sign -->
    <path d="M 70 26 H 86 M 78 18 V 34" />
    <!-- Circle -->
    <circle cx="20" cy="74" r="7" />
  </g>

  <!-- Middle glow elements (more intense blue, medium stroke) -->
  <g stroke="#2979ff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8">
    <!-- Star -->
    <path d="M 48 24 Q 48 52 76 52 Q 48 52 48 80 Q 48 52 20 52 Q 48 52 48 24 Z" />
    <!-- Plus Sign -->
    <path d="M 70 26 H 86 M 78 18 V 34" />
    <!-- Circle -->
    <circle cx="20" cy="74" r="7" />
  </g>

  <!-- Inner bright core elements (light blue/white core, thin stroke) -->
  <g stroke="#e3f2fd" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Star -->
    <path d="M 48 24 Q 48 52 76 52 Q 48 52 48 80 Q 48 52 20 52 Q 48 52 48 24 Z" />
    <!-- Plus Sign -->
    <path d="M 70 26 H 86 M 78 18 V 34" />
    <!-- Circle -->
    <circle cx="20" cy="74" r="7" />
  </g>
</svg>
